error_watch:
    enabled: '%env(bool:ERRORWATCH_ENABLED)%'
    endpoint: '%env(ERRORWATCH_DSN)%'
    api_key: '%env(ERRORWATCH_API_KEY)%'
    environment: '%kernel.environment%'

    breadcrumbs:
        enabled: true
        max_count: 100

    user_context:
        enabled: true
        capture_ip: true

    apm:
        enabled: true
        request_tracking: true

    monolog:
        enabled: true
        level: warning
