name: Build & Publish Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only (no push)'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git branch -r --contains "${{ github.sha }}" | grep -q 'origin/main'; then
            echo "✅ Tag ${{ github.ref_name }} is on main"
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Tag ${{ github.ref_name }} is NOT on main — skipping build"
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: guard
    if: needs.guard.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: api
            image: errorwatch-api
          - target: web
            image: errorwatch-web
    steps:
      - name: Resolve image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.ref }}" == "refs/tags/v"* ]]; then
            version="${{ github.ref_name }}"
            version="${version#v}"
            major_minor="$(printf '%s' "$version" | awk -F. '{print $1 "." $2}')"
            echo "tags=ghcr.io/makfly/${{ matrix.image }}:${version},ghcr.io/makfly/${{ matrix.image }}:${major_minor},ghcr.io/makfly/${{ matrix.image }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/makfly/${{ matrix.image }}:dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web image for runtime smoke test
        if: matrix.target == 'web'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          load: true
          tags: errorwatch-web:smoke
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test web runtime config
        if: matrix.target == 'web'
        run: ./scripts/smoke-test-web-runtime-config.sh errorwatch-web:smoke

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: ${{ github.event.inputs.dry_run != 'true' }}
          tags: ${{ steps.vars.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================
  # Cleanup old GHCR images (runs on schedule
  # and after each build-and-push)
  # =========================================
  cleanup:
    if: always() && needs.guard.outputs.allowed == 'true'
    needs: [guard, build-and-push]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [errorwatch-api, errorwatch-web]
    steps:
      - name: Delete untagged images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: ${{ matrix.package }}
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-untagged: true

      - name: Delete images older than 30 days (keep all semver)
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: ${{ matrix.package }}
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-untagged: false
          older-than: 30 days
          keep-n-tagged: 20
          exclude-tags: 'latest,dev'
          validate: true
